openapi: "3.0.3"
info:
  title: OLX Brasil - API de Anúncios
  description: |
    CLI para buscar e consultar anúncios da OLX Brasil.
    Utiliza o Crawl4AI como backend para contornar Cloudflare,
    extraindo dados estruturados do HTML renderizado (Next.js SSR).
  version: "1.0.0"
  x-pp-logo-url: "https://static.olx.com.br/recommendation/home/categories/default.webp"
  x-pp-color: "#6A0DAD"
  x-pp-repo: "https://github.com/niuarque-br/olx-pp-cli"

servers:
  - url: https://b279i8mvg0nr9p9cjp1exd1d.152.67.46.88.sslip.io
    description: Crawl4AI backend (acessa OLX via browser headless)

paths:
  /crawl:
    post:
      operationId: buscarAnuncios
      summary: Buscar anúncios na OLX
      description: |
        Busca anúncios na OLX com filtros.

        Constrói a URL da OLX a partir dos parâmetros:
        - Com categoria: /<categoria-path>?q=<termo>&o=<pagina>&ps=<sort>
        - Sem categoria: /brasil?q=<termo>&o=<pagina>&ps=<sort>
        - Com localização: /<localizacao>/<categoria-path>?q=<termo>
        - Com preço: adiciona &minPrice=<valor>&maxPrice=<valor>
      parameters:
        - name: q
          in: query
          description: Termo de busca
          schema: { type: string }
          example: "notebook"
        - name: categoria
          in: query
          description: |
            Caminho amigável da categoria (ex: informatica/notebooks, celulares,
            imoveis/venda, autos-e-pecas/carros-vans-e-utilitarios).
            Use "" (vazio) para todas as categorias.
          schema: { type: string }
          example: "informatica/notebooks"
        - name: pagina
          in: query
          description: Número da página
          schema: { type: integer, minimum: 1, default: 1 }
          example: 1
        - name: sort
          in: query
          description: "Ordenação: (vazio)=relevância, date=mais recentes, price_asc=menor preço, price_desc=maior preço"
          schema:
            type: string
            enum: ["", "date", "price_asc", "price_desc"]
          example: "date"
        - name: minPreco
          in: query
          description: Preço mínimo
          schema: { type: number }
          example: 500
        - name: maxPreco
          in: query
          description: Preço máximo
          schema: { type: number }
          example: 5000
        - name: localizacao
          in: query
          description: |
            Slug da localização.
            Ex: estado-sp, rio-de-janeiro-e-regiao, distrito-federal,
            grande-goiania-e-anapolis, minas-gerais
          schema: { type: string }
          example: "estado-sp"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [urls]
              properties:
                urls:
                  type: array
                  items: { type: string }
                  description: "URL da OLX para buscar (construída pelo CLI a partir dos parâmetros)"
                  example: ["https://www.olx.com.br/informatica/notebooks?q=notebook"]
                priority:
                  type: integer
                  default: 10
      responses:
        "200":
          description: "JSON bruto do Crawl4AI com __NEXT_DATA__ embedado no HTML. Use o script extract_olx_data.py para processar."
          content:
            application/json:
              schema:
                type: object

  /crawl/detalhes:
    post:
      operationId: detalhesAnuncio
      summary: Detalhes de um anúncio
      description: |
        Obtém detalhes completos de um anúncio da OLX.
        Extrai dados do Schema.org JSON-LD e do markdown renderizado.
      parameters:
        - name: id
          in: query
          description: "ID do anúncio (listId) - alternativamente, passe a URL completa"
          schema: { type: integer }
          example: 1455857240
        - name: url
          in: query
          description: "URL completa do anúncio. Se não informada, o CLI tenta construir a partir do ID (pode não funcionar sem a região/categoria)"
          schema: { type: string }
          example: "https://go.olx.com.br/grande-goiania-e-anapolis/informatica/notebooks/notebook-seminovo-para-estudos-com-ssd-1455857240"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [urls]
              properties:
                urls:
                  type: array
                  items: { type: string }
                  description: "URL do anúncio individual na OLX"
                  example: ["https://go.olx.com.br/grande-goiania-e-anapolis/informatica/notebooks/notebook-seminovo-para-estudos-com-ssd-1455857240"]
                priority:
                  type: integer
                  default: 10
      responses:
        "200":
          description: "HTML da página de detalhes. Contém Schema.org JSON-LD com dados estruturados."
          content:
            application/json:
              schema:
                type: object

  /crawl/categorias:
    post:
      operationId: listarCategorias
      summary: Listar categorias da OLX
      description: |
        Lista todas as categorias disponíveis na OLX.
        Extrai do __NEXT_DATA__ da página de busca.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [urls]
              properties:
                urls:
                  type: array
                  items: { type: string }
                  description: "URL da OLX para extrair categorias"
                  example: ["https://www.olx.com.br/"]
                priority:
                  type: integer
                  default: 10
      responses:
        "200":
          description: "HTML com __NEXT_DATA__ contendo categoriesList"
          content:
            application/json:
              schema:
                type: object
